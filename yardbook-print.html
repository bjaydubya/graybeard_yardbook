<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YardBook · Yardage Book Insert</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    @page { size: 3.75in 6.5in; margin: 0; }

    * {
      box-sizing: border-box;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    body {
      margin: 0;
      font-family: 'Outfit', -apple-system, sans-serif;
      background: #888;
    }

    /* ── Screen controls (hidden when printing) ───────────────────── */
    @media screen {
      body { display: flex; flex-direction: column; align-items: center; padding: 24px; min-height: 100vh; }
      .screen-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; justify-content: center; }
      .print-btn {
        background: #1a7c36; color: #fff; border: none; border-radius: 8px;
        padding: 9px 20px; font-size: .9rem; font-weight: 700;
        cursor: pointer; font-family: inherit; transition: background .15s;
      }
      .print-btn:hover { background: #196f3d; }
      .back-link { color: #5ac8fa; font-size: .84rem; text-decoration: none; }
      .print-hint { font-size: .78rem; color: #ccc; }
    }
    @media print {
      .screen-bar { display: none !important; }
      body { background: none; padding: 0; }
      .page-box { box-shadow: none; }
    }

    /* ── Page card ────────────────────────────────────────────────── */
    .page-box {
      width: 3.75in;
      height: 6.5in;
      background: #fff;
      color: #000;
      padding: 0.09in 0.09in 0.07in;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 4px 22px rgba(0,0,0,.35);
    }

    /* ── Header section ───────────────────────────────────────────── */
    .pg-title {
      font-size: 9pt; font-weight: 800; text-transform: uppercase;
      letter-spacing: .04em; color: #1a2533; line-height: 1;
    }
    .pg-sub { font-size: 6pt; color: #444; margin-top: 1.5pt; margin-bottom: 3pt; }
    .pg-divider { border: none; border-top: 1pt solid #333; margin: 0 0 2pt; }

    /* ── Matrix ───────────────────────────────────────────────────── */
    .matrix-wrap { flex: 1; overflow: hidden; }

    .yd-tbl {
      width: 100%;
      border-collapse: collapse;
      height: 100%;
      table-layout: fixed;
    }

    .yd-tbl th, .yd-tbl td {
      border: 0.4pt solid #ccc;
      text-align: center;
      vertical-align: middle;
      overflow: hidden;
      padding: 0;
      font-family: inherit;
    }

    /* Yardage label column */
    .yd-tbl .col-yds {
      font-size: 5pt; font-weight: 700; color: #333;
      background: #f4f4f6; border-right: 1pt solid #999;
      width: 17pt;
    }
    .col-yds.m50 { font-weight: 800; color: #000; background: #e8e8ed; border-top: 0.8pt solid #666; }
    .col-yds.m25 { color: #111; background: #efefef; }

    /* Club header row */
    .yd-tbl thead th {
      font-size: 5.5pt; font-weight: 800;
      height: 12pt; background: #1a2533; color: #fff;
      letter-spacing: .02em;
    }
    .yd-tbl thead th.col-yds-hdr {
      background: #2c3e50; font-size: 4.5pt; font-weight: 700; color: #aaa;
      text-transform: uppercase; letter-spacing: .06em;
    }

    /* Data rows */
    .yd-tbl tbody tr      { height: 8.2pt; }
    .yd-tbl tbody tr.b50  { background: #e8e8ed; }
    .yd-tbl tbody tr.b25  { background: #f2f2f5; }
    .yd-tbl tbody td      { font-size: 5.5pt; color: #111; }

    /* ── Speed band cells ─────────────────────────────────────────── */
    .c-center {
      background: #1a7c36 !important; color: #fff !important;
      font-weight: 800 !important; font-size: 6pt !important;
    }
    .c-hi, .c-lo1 {
      font-size: 5pt !important; font-weight: 700 !important;
      color: rgba(26,124,54,.80) !important;
    }
    .c-lo2 { /* color only, no text */ }

    /* ── Swing band cells ─────────────────────────────────────────── */
    .c-shoulder { background: rgba(255,214,10,.50)  !important; font-size: 5pt !important; font-weight: 800 !important; color: #000 !important; }
    .c-chest    { background: rgba(255,159,10,.50)  !important; font-size: 5pt !important; font-weight: 800 !important; color: #000 !important; }
    .c-ribs     { background: rgba(255,102,0,.50)   !important; font-size: 5pt !important; font-weight: 800 !important; color: #000 !important; }
    .c-hip      { background: rgba(255,69,58,.50)   !important; font-size: 5pt !important; font-weight: 800 !important; color: #fff !important; }

    /* ── Footer ───────────────────────────────────────────────────── */
    .pg-footer { border-top: 0.5pt solid #aaa; padding-top: 3pt; margin-top: 2pt; }
    .footer-clubs { font-size: 5pt; color: #333; margin-bottom: 0; line-height: 1.4; }
    .footer-clubs strong { color: #000; }
    .footer-swing {
      display: flex; gap: 5pt; align-items: center; flex-wrap: wrap; margin-bottom: 1pt;
    }
    .sw-item { display: flex; align-items: center; gap: 1.5pt; font-size: 4.5pt; }
    .sw-dot  { width: 5.5pt; height: 5.5pt; border-radius: 50%; flex-shrink: 0; border: 0.3pt solid rgba(0,0,0,.15); }
  </style>
</head>
<body>

<div class="screen-bar">
  <a href="index.html" class="back-link">← YardBook</a>
  <button class="print-btn" onclick="window.print()">🖨️ Print / Save as PDF</button>
  <span class="print-hint">Print dialog: set paper to 3.75" × 6.5" · No margins</span>
</div>

<div class="page-box">
  <div class="pg-title">Graybeard's YardBook</div>
  <hr class="pg-divider">

  <div class="matrix-wrap">
    <table class="yd-tbl">
      <thead id="ydHead"></thead>
      <tbody id="ydBody"></tbody>
    </table>
  </div>

  <div class="pg-footer">
    <div class="footer-swing" id="footerSwing"></div>
    <div class="footer-clubs" id="footerClubs"></div>
  </div>
</div>

<script>
// ── Load saved bag ────────────────────────────────────────────────────────
let saved = {};
try { saved = JSON.parse(localStorage.getItem('graybeards_yardbook')) || {}; } catch(e) {}

const bag         = saved.bag    || [];
const prefs       = saved.prefs  || {};
const isMetric    = !!prefs.isMetric;
const swingSystem = prefs.swingSystem || 'clock';

// ── Constants ─────────────────────────────────────────────────────────────
const YARD_STEP       = 5;
const MIN_YARDS       = 50;
const SWING_MAX_YARDS = 180;
const YARD_TO_M       = 0.9144;
const MPH_TO_KPH      = 1.60934;

const SWING_DATA = [
  { body:'Shoulder', clock:'10:00', clockShort:'10', bodyInit:'S', delta:-15, cls:'c-shoulder', color:'#ffd60a' },
  { body:'Chest',    clock:'9:00',  clockShort:'9',  bodyInit:'C', delta:-30, cls:'c-chest',    color:'#ff9f0a' },
  { body:'Ribs',     clock:'8:00',  clockShort:'8',  bodyInit:'R', delta:-45, cls:'c-ribs',     color:'#ff6600' },
  { body:'Hip',      clock:'7:00',  clockShort:'7',  bodyInit:'H', delta:-60, cls:'c-hip',      color:'#ff453a' },
];

// ── Elevation ─────────────────────────────────────────────────────────────
let elevPct = 0;
if (prefs.pctManual && prefs.pctOverride != null) {
  elevPct = prefs.pctOverride;
} else {
  const home = prefs.homeElev || 0;
  const away = prefs.awayElev || 0;
  elevPct = ((away - home) / (isMetric ? 304.8 : 1000)) * 2;
}
const elevFactor = 1 + elevPct / 100;

// ── Display helpers ───────────────────────────────────────────────────────
function toDist(y)  { return isMetric ? Math.round(y * YARD_TO_M)  : y; }
function toSpeed(s) { return isMetric ? Math.round(s * MPH_TO_KPH) : s; }
const distUnit  = isMetric ? 'm'   : 'yds';
const speedUnit = isMetric ? 'kph' : 'mph';

// ── Build bag & zones ─────────────────────────────────────────────────────
const clubs = bag.filter(c => c.yardage > 0).slice(0, 14);

const maxRaw = clubs.reduce((m, c) => Math.max(m, Math.round((c.yardage||0)*elevFactor)), 230);
const maxY   = Math.ceil(maxRaw / YARD_STEP) * YARD_STEP + 10; // 10-yd headroom for print

const zones = clubs.map(club => {
  if (!club.yardage) return null;
  const base = Math.round((club.yardage * elevFactor) / YARD_STEP) * YARD_STEP;
  return {
    hi: base + YARD_STEP, center: base, lo1: base - YARD_STEP, lo2: base - 2*YARD_STEP,
    speed: club.speed,
    swings: club.yardage <= SWING_MAX_YARDS
      ? SWING_DATA.map(s => ({
          y:     base + s.delta,
          cls:   s.cls,
          label: swingSystem === 'body' ? s.bodyInit : s.clockShort,
        }))
      : [],
  };
});

// ── Sub-heading ───────────────────────────────────────────────────────────

// ── Header row ────────────────────────────────────────────────────────────
const head = document.getElementById('ydHead');
let hHtml = `<tr><th class="col-yds-hdr">${isMetric ? 'M' : 'YDS'}</th>`;
clubs.forEach(c => {
  hHtml += `<th>${(c.name || '?').slice(0,2).toUpperCase()}</th>`;
});
// fill remaining slots to keep table fixed-layout happy
for (let i = clubs.length; i < 14; i++) hHtml += '<th style="background:#1e1e22;"></th>';
hHtml += '</tr>';
head.innerHTML = hHtml;

// ── Body rows ─────────────────────────────────────────────────────────────
const body = document.getElementById('ydBody');
let bHtml = '';

for (let y = maxY; y >= MIN_YARDS; y -= YARD_STEP) {
  const is50 = y % 50 === 0;
  const is25 = !is50 && y % 25 === 0;
  const rowCls = is50 ? ' class="b50"' : is25 ? ' class="b25"' : '';
  const ydsCls = 'col-yds' + (is50 ? ' m50' : is25 ? ' m25' : '');
  bHtml += `<tr${rowCls}><td class="${ydsCls}">${toDist(y)}</td>`;

  zones.forEach(z => {
    if (!z) { bHtml += '<td></td>'; return; }

    if (y === z.center) {
      const spd = z.speed != null ? toSpeed(z.speed) : '';
      bHtml += `<td class="c-center">${spd}</td>`;
    } else if (y === z.hi) {
      const spd = z.speed != null ? toSpeed(z.speed + 2) : '';
      bHtml += `<td class="c-hi" style="background:rgba(48,209,88,.30);">${spd}</td>`;
    } else if (y === z.lo1) {
      const spd = z.speed != null ? toSpeed(z.speed - 2) : '';
      bHtml += `<td class="c-lo1" style="background:rgba(48,209,88,.20);">${spd}</td>`;
    } else if (y === z.lo2) {
      bHtml += `<td class="c-lo2" style="background:rgba(48,209,88,.10);"></td>`;
    } else {
      const sw = z.swings.find(s => s.y === y);
      if (sw) {
        bHtml += `<td class="${sw.cls}">${sw.label}</td>`;
      } else {
        bHtml += '<td></td>';
      }
    }
  });

  // pad if fewer than 14 clubs
  for (let i = clubs.length; i < 14; i++) bHtml += '<td style="border-color:#eee;"></td>';
  bHtml += '</tr>';
}
body.innerHTML = bHtml;

// ── Footer: swing legend ──────────────────────────────────────────────────
const swingLegend = document.getElementById('footerSwing');
const swingItems = [
  { color:'#1a7c36', label:'Full (11:00)' },
  ...SWING_DATA.map(s => ({
    color: s.color,
    label: swingSystem === 'body'
      ? `${s.body} (${s.clock})`
      : `${s.clock} (${s.body})`
  }))
];
swingLegend.innerHTML = swingItems.map(({ color, label }) =>
  `<span class="sw-item"><span class="sw-dot" style="background:${color};"></span>${label}</span>`
).join('');

// ── Footer: club list ─────────────────────────────────────────────────────
const clubList = clubs.map(c =>
  `<strong>${(c.name||'?').toUpperCase()}</strong>:${toDist(Math.round((c.yardage||0)*elevFactor))}`
).join(' · ');
document.getElementById('footerClubs').innerHTML = clubList;

// ── Footer: params ────────────────────────────────────────────────────────
</script>

</body>
</html>
